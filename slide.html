<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Multi-View Touch Slider</title>
  <style>
  
    .slider-container {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 1100px; 
      margin: 0 auto 2rem;
    }

    .slider-track {
      display: flex;
      gap: 10px; 
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      width: 100%;
      border-radius: 8px;
      scrollbar-width: none; 
    }

    .slider-track::-webkit-scrollbar {
      display: none; 
    }

    .slide {
      flex: 0 0 var(--slide-width, 250px); 
      height: 250px;
      scroll-snap-align: start; 
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
      border-radius: 8px;
    }

    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 1.5rem;
      cursor: pointer;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.2s, opacity 0.2s;
    }

    .slider-btn:hover { background: rgba(0, 0, 0, 0.9); }
    .prev-btn { left: -20px; } 
    .next-btn { right: -20px; }

    .slider-btn.disabled {
      opacity: 0.5;
      pointer-events: none; 
    }

    /* NEW: Hide navigation buttons on screens smaller than 768px */
    @media (max-width: 768px) {
      .slider-btn {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div class="slider-container" style="--slide-width: 200px;">
    <button class="slider-btn prev-btn" aria-label="Previous">‹</button>
    <div class="slider-track">
      <div class="slide" style="background: #ff7675;">1</div>
      <div class="slide" style="background: #74b9ff;">2</div>
      <div class="slide" style="background: #55efc4;">3</div>
      <div class="slide" style="background: #ffeaa7;">4</div>
      <div class="slide" style="background: #a29bfe;">5</div>
      <div class="slide" style="background: #fab1a0;">6</div>
    </div>
    <button class="slider-btn next-btn" aria-label="Next">›</button>
  </div>

  <div class="slider-container" style="--slide-width: 45%;">
    <button class="slider-btn prev-btn" aria-label="Previous">‹</button>
    <div class="slider-track">
      <div class="slide" style="background: #ffeaa7;">A</div>
      <div class="slide" style="background: #a29bfe;">B</div>
      <div class="slide" style="background: #fab1a0;">C</div>
      <div class="slide" style="background: #ff7675;">D</div>
      <div class="slide" style="background: #74b9ff;">E</div>
    </div>
    <button class="slider-btn next-btn" aria-label="Next">›</button>
  </div>

  <script>
    document.querySelectorAll(".slider-container").forEach(c=>{let t=c.querySelector(".slider-track"),p=c.querySelector(".prev-btn"),n=c.querySelector(".next-btn"),u=()=>{p.classList.toggle("disabled",t.scrollLeft<=1),n.classList.toggle("disabled",t.scrollLeft+t.clientWidth>=t.scrollWidth-1)};n.addEventListener("click",()=>{t.scrollBy({left:t.clientWidth,behavior:"smooth"})}),p.addEventListener("click",()=>{t.scrollBy({left:-t.clientWidth,behavior:"smooth"})}),t.addEventListener("scroll",u),window.addEventListener("resize",u),u()});
  </script>

</body>
</html>
